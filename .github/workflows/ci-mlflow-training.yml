name: CI - Corn Yield MLflow Training

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  train:
    runs-on: ubuntu-latest

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Miniconda
        uses: conda-incubator/setup-miniconda@v3
        with:
          python-version: '3.9'
          activate-environment: mlflow-env
          environment-file: MLproject/conda.yaml

      - name: Set MLflow tracking to DagsHub
        env:
          MLFLOW_TRACKING_URI: ${{ secrets.MLFLOW_TRACKING_URI }}
          MLFLOW_TRACKING_USERNAME: ${{ secrets.MLFLOW_TRACKING_USERNAME }}
          MLFLOW_TRACKING_PASSWORD: ${{ secrets.MLFLOW_TRACKING_PASSWORD }}
        run: echo "MLflow tracking configured"

      - name: Run MLflow Project
        shell: bash -l {0}
        env:
          MLFLOW_TRACKING_URI: ${{ secrets.MLFLOW_TRACKING_URI }}
          MLFLOW_TRACKING_USERNAME: ${{ secrets.MLFLOW_TRACKING_USERNAME }}
          MLFLOW_TRACKING_PASSWORD: ${{ secrets.MLFLOW_TRACKING_PASSWORD }}
        run: |
          source ~/miniconda/etc/profile.d/conda.sh
          conda activate mlflow-env
          which mlflow  # debug: confirm PATH
          mlflow run MLproject -e main --env-manager=conda -P data_path=MLproject/preprocessed_corn_data.csv -P n_estimators=100 -P max_depth=10 -P random_state=42 -P test_size=0.2

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push Docker Image
        run: |
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/corn-yield-model:latest .
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/corn-yield-model:latest

